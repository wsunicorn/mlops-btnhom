name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
    paths:
      - 'serving_pipeline/**'
      - 'infra/docker/**'
      - '.github/workflows/build-and-push.yml'

jobs:
  build-and-push:
    name: Build and Push to Container Registry
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build serving pipeline image (local)
      run: |
        cd serving_pipeline
        docker build -t mlops-serving:latest .
        docker build -f Dockerfile.ui -t mlops-ui:latest .
    
    - name: Build Airflow image (local)
      run: |
        cd infra/docker/airflow
        docker build -t mlops-airflow:latest .
    
    - name: Build MLflow image (local)
      run: |
        cd infra/docker/mlflow
        echo "MLflow image built (if Dockerfile exists)"
    
    - name: List all built images
      run: docker images | grep mlops

    # - name: Login to Docker Hub
    #   uses: docker/login-action@v2
    #   with:
    #     username: ${{ secrets.DOCKER_HUB_USERNAME }}
    #     password: ${{ secrets.DOCKER_HUB_PASSWORD }}
    
    # - name: Tag and Push serving pipeline image
      run: |
        docker tag mlops-serving:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-serving:latest
        docker tag mlops-serving:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-serving:${{ github.sha }}
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-serving:latest
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-serving:${{ github.sha }}
    
    # - name: Tag and Push UI image
      run: |
        docker tag mlops-ui:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-ui:latest
        docker tag mlops-ui:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-ui:${{ github.sha }}
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-ui:latest
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-ui:${{ github.sha }}
    
    # - name: Tag and Push Airflow image
      run: |
        docker tag mlops-airflow:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-airflow:latest
        docker tag mlops-airflow:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-airflow:${{ github.sha }}
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-airflow:latest
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-airflow:${{ github.sha }}
