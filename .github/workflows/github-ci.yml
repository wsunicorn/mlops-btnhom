name: GitHub CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - data-pipeline
          - model_pipeline
          - serving_pipeline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          case "${{ matrix.target }}" in
            data-pipeline)
              pip install -r data-pipeline/requirements.txt || true
              ;;
            model_pipeline)
              if [ -f model_pipeline/requirements.txt ]; then
                pip install -r model_pipeline/requirements.txt || true
              elif [ -f model_pipeline/src/requirements.txt ]; then
                pip install -r model_pipeline/src/requirements.txt || true
              fi
              ;;
            serving_pipeline)
              pip install -r serving_pipeline/requirements.txt || true
              ;;
          esac
          pip install pytest || true

      - name: Run smoke tests
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            data-pipeline)
              test -f data-pipeline/README.md
              ;;
            model_pipeline)
              test -f model_pipeline/README.md
              ;;
            serving_pipeline)
              python serving_pipeline/test.py || true
              ;;
          esac

  docker-build-serving:
    runs-on: ubuntu-latest
    needs: python-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: serving_pipeline
          file: serving_pipeline/Dockerfile
          push: false

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: serving_pipeline
          file: serving_pipeline/Dockerfile.ui
          push: false
